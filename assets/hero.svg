<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#EEF2F6" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Clean Background -->
  <rect width="500" height="500" rx="24" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid Lines -->
  <g stroke="#E2E8F0" stroke-width="1" opacity="0.8">
    <path d="M 50 0 L 50 500 M 100 0 L 100 500 M 150 0 L 150 500 M 200 0 L 200 500 M 250 0 L 250 500 M 300 0 L 300 500 M 350 0 L 350 500 M 400 0 L 400 500 M 450 0 L 450 500" />
    <path d="M 0 50 L 500 50 M 0 100 L 500 100 M 0 150 L 500 150 M 0 200 L 500 200 M 0 250 L 500 250 M 0 300 L 500 300 M 0 350 L 500 350 M 0 400 L 500 400 M 0 450 L 500 450" />
  </g>

  <!-- Physics Wave / Sinusoidal Path -->
  <path d="M 50 250 Q 125 100 200 250 T 350 250 T 450 250" fill="none" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <path d="M 50 250 Q 125 150 200 250 T 350 250 T 450 250" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" />

  <!-- Dotted Trajectory (Projectile Motion) -->
  <path d="M 80 400 Q 220 100 380 400" fill="none" stroke="#7C3AED" stroke-width="3" stroke-dasharray="6,6" />
  <circle cx="230" cy="180" r="8" fill="#7C3AED" filter="url(#glow)" />
  <line x1="230" y1="180" x2="270" y2="140" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Pendulum simulation component representation -->
  <line x1="250" y1="50" x2="180" y2="180" stroke="#64748B" stroke-width="2" />
  <circle cx="250" cy="50" r="4" fill="#475569" />
  <circle cx="180" cy="180" r="14" fill="url(#primaryGrad)" filter="url(#glow)" />

  <!-- Tech Interface / AI Circle Concept -->
  <circle cx="350" cy="150" r="60" fill="none" stroke="#E2E8F0" stroke-width="2" />
  <circle cx="350" cy="150" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="8,4" />
  
  <!-- Atom orbits in bottom right -->
  <g transform="translate(380, 360)">
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#2563EB" stroke-width="1.5" transform="rotate(45)" opacity="0.6" />
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#7C3AED" stroke-width="1.5" transform="rotate(-45)" opacity="0.6" />
    <circle cx="0" cy="0" r="10" fill="url(#primaryGrad)" />
    <circle cx="42" cy="14" r="4" fill="#3B82F6" />
    <circle cx="-42" cy="-14" r="4" fill="#8B5CF6" />
  </g>

  <!-- Glowing Nodes/Variables -->
  <g transform="translate(80, 120)" filter="url(#glow)">
    <rect width="90" height="36" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <circle cx="18" cy="18" r="6" fill="#2563EB" />
    <text x="36" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">F = m · a</text>
  </g>
  
  <g transform="translate(20, 320)" filter="url(#glow)">
    <rect width="100" height="36" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <circle cx="18" cy="18" r="6" fill="#10B981" />
    <text x="32" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">v = s / t</text>
  </g>

  <g transform="translate(320, 240)" filter="url(#glow)">
    <rect width="110" height="36" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <circle cx="18" cy="18" r="6" fill="#F59E0B" />
    <text x="32" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">Ep = m·g·h</text>
  </g>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5" />
    </marker>
  </defs>
</svg>
