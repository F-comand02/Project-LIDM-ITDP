<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <!-- Orbit 1 -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" transform="rotate(30 50 50)" stroke-dasharray="120" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="360;0" dur="4s" repeatCount="indefinite" />
  </ellipse>
  <!-- Orbit 2 -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" transform="rotate(-30 50 50)" stroke-dasharray="120" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;360" dur="4s" repeatCount="indefinite" />
  </ellipse>
  <!-- Center Nucleus / Atom -->
  <circle cx="50" cy="50" r="8" fill="#4F46E5" />
  <circle cx="50" cy="50" r="4" fill="#FFFFFF" />
  <!-- Small Electron particles on orbits -->
  <circle r="3" fill="#7C3AED">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 15 50 A 35 12 30 1 1 85 50 A 35 12 30 1 1 15 50" />
  </circle>
</svg>
